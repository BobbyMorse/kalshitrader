# Fly.io configuration for Kalshi arb bot backend
app = "kalshitrader"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8003
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "120s"
    interval = "15s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[env]
  STATE_FILE = "/data/trader_state.json"

[mounts]
  source = "kalshi_data"
  destination = "/data"

# Required secrets — set with: fly secrets set KEY=value
# fly secrets set KALSHI_API_KEY_ID=your-key-id
# fly secrets set KALSHI_PRIVATE_KEY="$(cat /path/to/bmo.key)"
# fly secrets set KALSHI_HOST=trading-api.kalshi.com
